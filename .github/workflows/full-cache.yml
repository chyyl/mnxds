name: Full Cache

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 完整构建（下载所有依赖）
        run: ./gradlew build prepareClientRun --no-daemon --refresh-dependencies

      - name: 打包 Gradle 缓存
        run: tar -czf gradle-caches.tar.gz -C ~/.gradle caches

      - name: 上传缓存
        uses: actions/upload-artifact@v4
        with:
          name: gradle-caches
          path: gradle-caches.tar.gz
