name: Build MCreator Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 设置 Gradle 执行权限
        run: chmod +x gradlew

      - name: 构建模组
        run: ./gradlew build --no-daemon

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
