name: Build and Cache Dependencies

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 设置 Gradle 执行权限
        run: chmod +x gradlew

      - name: 构建模组（下载所有依赖）
        run: ./gradlew build --no-daemon

      - name: 打包 Gradle 缓存（用于本地初始化）
        run: tar -czf gradle-caches.tar.gz ~/.gradle/caches/

      - name: 上传缓存文件（给本地用）
        uses: actions/upload-artifact@v4
        with:
          name: gradle-caches
          path: gradle-caches.tar.gz

      - name: 上传模组 JAR（成品）
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
